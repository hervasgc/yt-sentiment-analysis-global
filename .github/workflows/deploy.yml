name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: yt-analyzer-service
  JOB_NAME: yt-analyzer-job
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/yt-analyzer

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker

      - name: Build and Push Container
        run: |-
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Deploy Service to Cloud Run
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --no-allow-unauthenticated \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --timeout=3600 \
            --cpu=2 \
            --memory=4Gi \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GOOGLE_CLOUD_REGION=${{ env.REGION }},CLOUD_RUN_JOB_NAME=${{ env.JOB_NAME }}"

      - name: Deploy/Update Cloud Run Job
        run: |-
          # Check if job exists
          if gcloud run jobs describe ${{ env.JOB_NAME }} --region ${{ env.REGION }} > /dev/null 2>&1; then
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
              --tasks 1 \
              --max-retries 0 \
              --command "python" \
              --args "main.py","all"
          else
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --region ${{ env.REGION }} \
              --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
              --tasks 1 \
              --max-retries 0 \
              --command "python" \
              --args "main.py","all"
          fi
